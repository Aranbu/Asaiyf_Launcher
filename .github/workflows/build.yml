name: Build Installer Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 1. Install PyInstaller
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    # 2. JOB 1: Build the standalone EXE file inside the folder
    # This generates: "Asaiyf Launcher/dist/asaiyf_launcher.exe"
    - name: Build EXE with PyInstaller
      run: |
        cd "Asaiyf Launcher"
        pyinstaller --onefile --name="asaiyf_launcher" asaiyf_launcher.py

    # 3. JOB 2: Run native Windows Inno Setup command directly from the system files
    - name: Compile Installer with Native Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_config.iss
      shell: powershell

    # 4. Automatically attach the finished "setup_wizard.exe" to your Releases page
    - name: Upload Installer to Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/setup_wizard.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
