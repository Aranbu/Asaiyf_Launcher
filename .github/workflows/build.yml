name: Build Installer Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 1. Install PyInstaller
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    # 2. JOB 1: Build the standalone EXE file inside the folder
    # This generates: "Asaiyf Launcher/dist/asaiyf_launcher.exe"
    - name: Build EXE with PyInstaller
      run: |
        cd "Asaiyf Launcher"
        pyinstaller --onefile --name="asaiyf_launcher" asaiyf_launcher.py

    # 3. JOB 2: Run the updated Inno Setup Action compiler tool
    - name: Compile .ISS to .EXE Installer
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: installer_config.iss

    # 4. Automatically attach the finished "setup_wizard.exe" to your Releases page
    - name: Upload Installer to Release
      uses: softprops/action-gh-release@v2
      with:
        files: Output/setup_wizard.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
